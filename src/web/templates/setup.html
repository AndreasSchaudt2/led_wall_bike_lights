<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED Bike Lights Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .status {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚴 LED Bike Lights</h1>
        <p class="subtitle">Setup your Wi-Fi connection</p>
        
        <div id="status" class="status disconnected">
            Checking connection...
        </div>
        
        <form id="setupForm">
            <div class="form-group">
                <label for="ssid">Network (SSID)</label>
                <input type="text" id="ssid" name="ssid" placeholder="Your Wi-Fi network name" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Your Wi-Fi password" required>
            </div>
            
            <button type="submit" id="connectBtn">
                Connect
            </button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="footer">
            <p>Connected device will resume normal operation</p>
        </div>
    </div>
    
    <script>
        const statusEl = document.getElementById('status');
        const messageEl = document.getElementById('message');
        const connectBtn = document.getElementById('connectBtn');
        const form = document.getElementById('setupForm');
        
        // Check connection status
        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.connected && data.info.ssid) {
                    statusEl.className = 'status connected';
                    statusEl.innerHTML = `✓ Connected to <strong>${data.info.ssid}</strong>`;
                } else {
                    statusEl.className = 'status disconnected';
                    statusEl.innerHTML = 'Not connected to Wi-Fi';
                }
            } catch (error) {
                console.error('Status check failed:', error);
            }
        }
        
        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const ssid = document.getElementById('ssid').value;
            const password = document.getElementById('password').value;
            
            connectBtn.disabled = true;
            connectBtn.innerHTML = '<span class="spinner"></span>Connecting...';
            messageEl.className = 'message';
            messageEl.textContent = '';
            
            try {
                const response = await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ssid, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageEl.className = 'message success';
                    messageEl.textContent = '✓ Connected! Device will restart soon.';
                    form.reset();
                    setTimeout(checkStatus, 2000);
                } else {
                    messageEl.className = 'message error';
                    messageEl.textContent = '✗ ' + (data.error || 'Connection failed');
                }
            } catch (error) {
                messageEl.className = 'message error';
                messageEl.textContent = '✗ Network error: ' + error.message;
            } finally {
                connectBtn.disabled = false;
                connectBtn.innerHTML = 'Connect';
            }
        });
        
        // Initial check
        checkStatus();
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
